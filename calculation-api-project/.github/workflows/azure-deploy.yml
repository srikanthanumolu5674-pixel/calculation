name: Build and Deploy to Azure VM

on:
  push:
    branches:
      - main

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Verify Repository Structure
        run: |
          pwd
          ls -la
          find . -name pom.xml

      - name: Build JAR
        working-directory: calculation-api-project
        run: mvn clean package -DskipTests

      - name: Rename JAR
        run: |
          cp calculation-api-project/target/*.jar app.jar

      - name: Copy JAR to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          password: ${{ secrets.VM_PASSWORD }}
          source: "app.jar"
          target: "/home/srikanth/app"

      - name: Start Application on VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          password: ${{ secrets.VM_PASSWORD }}
          script: |
            pkill -f 'java -jar' || true
            cd /home/srikanth/app
            nohup java -jar app.jar > app.log 2>&1 &
            sleep 10
            ps -ef | grep java
